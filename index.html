<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emissor de Cotação - Tubocone / Tubonord</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- jsPDF e AutoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      -webkit-tap-highlight-color: transparent;
    }

    .font-display {
      font-family: 'Space+Grotesk', sans-serif;
    }

    .primary-color { background-color: #1e3a6e; }
    .primary-text { color: #1e3a6e; }
    .border-github { border-color: #d0d7de; }

    /* Custom Input Styles */
    input, select, textarea {
      transition: all 0.2s ease;
      min-height: 44px; /* Touch target accessibility */
    }

    input:focus, select:focus, textarea:focus {
      border-color: #0969da !important;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15) !important;
      outline: none;
    }

    /* Animation */
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive adjustments for the table boxes */
    @media (max-width: 640px) {
      .condicao-box {
        width: 100% !important;
        margin-bottom: 8px;
      }
    }
  </style>
</head>
<body class="pt-24 sm:pt-28 md:pt-32">

  <!-- Header Fixo -->
  <header class="fixed top-0 left-0 right-0 h-20 sm:h-24 md:h-28 primary-color text-white z-50 flex items-center shadow-xl border-b border-white/10 overflow-hidden">
    <div class="container mx-auto px-4 flex justify-between items-center sm:justify-center sm:gap-6 md:gap-12">
      <!-- Unidade Ceará -->
      <div id="logo-ce" class="flex flex-col items-center transition-all duration-300">
        <div class="h-8 w-16 sm:h-10 sm:w-20 md:h-12 md:w-24 mb-1 flex items-center justify-center">
          <img src='data:image/svg+xml;utf8,<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="60" rx="8" fill="%231e3a6e"/><text x="50%" y="38" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="white" text-anchor="middle">TUBOCONE</text></svg>' width="60" alt="Tubocone">
        </div>
        <span class="text-[8px] sm:text-[10px] font-bold uppercase tracking-widest mt-1 opacity-100">TUBOCONE</span>
      </div>

      <div class="hidden sm:block h-10 md:h-12 w-px bg-white/20"></div>

      <div class="text-center px-2">
        <h1 class="text-sm sm:text-lg md:text-xl font-bold uppercase tracking-tight font-display line-clamp-1">Emissor de Cotação</h1>
        <p id="unidade-texto" class="text-[8px] sm:text-[10px] md:text-xs text-white/60 font-medium uppercase tracking-wider truncate max-w-[150px] sm:max-w-none mx-auto">Selecione a Unidade</p>
      </div>

      <div class="hidden sm:block h-10 md:h-12 w-px bg-white/20"></div>

      <!-- Unidade Pernambuco -->
      <div id="logo-pe" class="flex flex-col items-center transition-all duration-300 opacity-30">
        <div class="h-8 w-16 sm:h-10 sm:w-20 md:h-12 md:w-24 mb-1 flex items-center justify-center">
          <img src='data:image/svg+xml;utf8,<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="60" rx="8" fill="%231e3a6e"/><text x="50%" y="38" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="white" text-anchor="middle">TUBONORD</text></svg>' width="60" alt="Tubonord">
        </div>
        <span class="text-[8px] sm:text-[10px] font-bold uppercase tracking-widest mt-1 opacity-100">TUBONORD</span>
      </div>
    </div>
  </header>

  <main class="container mx-auto max-w-4xl px-4 pb-20">
    <div class="bg-white rounded-2xl md:rounded-3xl shadow-2xl shadow-slate-200/50 p-5 md:p-10 border border-slate-100">
      
      <!-- Faturamento -->
      <section class="mb-8 md:mb-10">
        <label class="block text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Unidade de Faturamento</label>
        <select 
          id="razao_faturamento" 
          onchange="atualizarInterface()"
          class="w-full p-3 md:p-4 bg-slate-50 border-2 border-github rounded-xl md:rounded-2xl font-medium text-slate-700 outline-none hover:bg-white focus:bg-white text-sm md:text-base"
        >
          <option value="">Selecione...</option>
          <optgroup label="Ceará (Tubocone)">
            <option value="tubotecnico">TUBOTÉCNICO INDUSTRIA E COMERCIO</option>
            <option value="tubocone">TUBOCONE INDUSTRIA E COMERCIO</option>
            <option value="palmeiras_filial">PALMEIRAS (Filial)</option>
          </optgroup>
          <optgroup label="Pernambuco (Tubonord)">
            <option value="tubonord">TUBONORD INDUSTRIA E COMERCIO</option>
            <option value="palmeiras_matriz">PALMEIRAS (Matriz)</option>
          </optgroup>
        </select>
      </section>

      <!-- Dados Cliente -->
      <section class="mb-10 md:mb-12">
        <div class="flex items-center gap-2 md:gap-3 mb-6">
          <div class="w-1 md:w-1.5 h-5 md:h-6 primary-color rounded-full"></div>
          <h3 class="text-xs md:text-sm font-bold text-slate-700 uppercase tracking-widest">Informações do Cliente</h3>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
          <div class="space-y-1">
            <label class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase ml-1">EMPRESA DESTINATÁRIA:</label>
            <input type="text" id="cliente" class="w-full p-3 border border-github rounded-xl bg-slate-50/50 hover:bg-white text-sm md:text-base">
          </div>
          <div class="space-y-1">
            <label class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase ml-1">SOLICITADO POR:</label>
            <input type="text" id="att" class="w-full p-3 border border-github rounded-xl bg-slate-50/50 hover:bg-white text-sm md:text-base">
          </div>
          <div class="md:col-span-2 space-y-1">
            <label class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase ml-1">Vendedor / Resp. Comercial</label>
            <input type="text" id="resp_comercial" class="w-full p-3 border border-github rounded-xl bg-slate-50/50 hover:bg-white text-sm md:text-base">
          </div>
        </div>
      </section>

      <!-- Itens -->
      <section class="mb-10 md:mb-12">
        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center gap-2 md:gap-3">
            <div class="w-1 md:w-1.5 h-5 md:h-6 primary-color rounded-full"></div>
            <h3 class="text-xs md:text-sm font-bold text-slate-700 uppercase tracking-widest">Produtos</h3>
          </div>
        </div>

        <div id="lista-produtos" class="space-y-3 mb-6">
          <!-- Inserção dinâmica via JS -->
        </div>

        <button 
          id="btn-abrir-form"
          onclick="abrirFormProduto()"
          class="w-full py-4 border-2 border-dashed border-slate-200 rounded-xl md:rounded-2xl text-slate-400 font-bold text-sm hover:border-slate-300 hover:bg-slate-50 transition-all flex items-center justify-center gap-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adicionar Novo Item
        </button>

        <!-- Formulário de Produto -->
        <div id="form-produto" class="hidden fade-in bg-slate-50 border-2 border-slate-100 rounded-2xl md:rounded-3xl p-4 md:p-6 space-y-4 md:space-y-6">
          <div class="space-y-1">
            <label class="text-[10px] md:text-[11px] font-bold text-slate-500 uppercase ml-1">Descrição</label>
            <select id="t-desc" class="w-full p-3 border border-github rounded-xl text-sm md:text-base">
              <option value="TUBO PAPELÃO">TUBO PAPELÃO</option>
              <option value="TUBO PLÁSTICO">TUBO PLÁSTICO</option>
              <option value="TUBETE">TUBETE</option>
              <option value="CONE">CONE</option>
              <option value="CANTONEIRA">CANTONEIRA</option>
              <option value="ARRUELA">ARRUELA</option>
              <option value="BARRICA">BARRICA</option>
              <option value="APARA">APARA</option>
            </select>
          </div>
          
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
            <div class="space-y-1">
              <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase ml-1">Medidas</label>
              <input type="text" id="t-med" placeholder="Ex: 50x50" class="w-full p-2.5 border border-github rounded-xl text-sm">
            </div>
            <div class="space-y-1">
              <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase ml-1">Quantidade</label>
              <input type="text" id="t-qtd" placeholder="0" class="w-full p-2.5 border border-github rounded-xl text-sm">
            </div>
            <div class="space-y-1">
              <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase ml-1">UND</label>
              <select id="t-un" class="w-full p-2.5 border border-github rounded-xl text-sm">
                <option value="KG">KG</option>
                <option value="UND">UND</option>
                <option value="PÇS">PÇS</option>
              </select>
            </div>
            <div class="space-y-1">
              <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase ml-1">IPI%</label>
              <input type="text" id="t-ipi" value="0" class="w-full p-2.5 border border-github rounded-xl text-sm">
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 pt-4 border-t border-slate-200">
            <div class="space-y-1">
              <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase ml-1">ICMS %</label>
              <input type="text" id="t-icms" value="0" class="w-full p-2.5 border border-github rounded-xl text-sm">
            </div>
            <div class="space-y-1">
              <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase ml-1">Unit. CIF (R$)</label>
              <input type="text" id="t-cif" placeholder="0,00" class="w-full p-2.5 border border-github rounded-xl text-sm">
            </div>
            <div class="space-y-1">
              <label class="text-[9px] md:text-[10px] font-bold text-slate-400 uppercase ml-1">Unit. FOB (R$)</label>
              <input type="text" id="t-fob" placeholder="0,00" class="w-full p-2.5 border border-github rounded-xl text-sm">
            </div>
          </div>

          <div class="flex flex-col sm:flex-row gap-3 md:gap-4 pt-2">
            <button onclick="cancelarProduto()" class="order-2 sm:order-1 flex-1 py-3 text-slate-500 font-bold text-sm bg-slate-200 rounded-xl hover:bg-slate-300">Cancelar</button>
            <button onclick="salvarProduto()" class="order-1 sm:order-2 flex-[2] py-3 bg-green-500 text-white font-bold text-sm rounded-xl hover:bg-green-600 shadow-lg shadow-green-100 flex items-center justify-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              Confirmar Item
            </button>
          </div>
        </div>
      </section>

      <!-- Condições -->
      <section class="mb-10 md:mb-12">
        <div class="flex items-center gap-2 md:gap-3 mb-6">
          <div class="w-1 md:w-1.5 h-5 md:h-6 primary-color rounded-full"></div>
          <h3 class="text-xs md:text-sm font-bold text-slate-700 uppercase tracking-widest">Condições de Venda</h3>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-6">
          <div class="space-y-1">
            <label class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase ml-1">Pagamento (Dias)</label>
            <input type="text" id="pagamento" class="w-full p-3 border border-github rounded-xl bg-slate-50/50 text-sm">
          </div>
          <div class="space-y-1">
            <label class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase ml-1">Prazo Entrega (Dias)</label>
            <input type="text" id="prazo" class="w-full p-3 border border-github rounded-xl bg-slate-50/50 text-sm">
          </div>
          <div class="space-y-1">
            <label class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase ml-1">Validade (Dias)</label>
            <input type="text" id="validade" class="w-full p-3 border border-github rounded-xl bg-slate-50/50 text-sm">
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase ml-1">Observações Adicionais</label>
          <textarea id="obs" rows="3" class="w-full p-4 border border-github rounded-2xl bg-slate-50/50 resize-none text-sm"></textarea>
        </div>
      </section>

      <button 
        onclick="validarEGerar()"
        class="group w-full py-5 md:py-6 primary-color text-white font-bold text-base md:text-lg rounded-2xl hover:scale-[1.01] transition-all shadow-2xl shadow-blue-200 active:scale-[0.99] flex items-center justify-center gap-3"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 md:w-6 md:h-6 group-hover:rotate-12 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        GERAR COTAÇÃO PDF
      </button>
    </div>

    <footer class="mt-8 text-center text-slate-400 text-[10px] font-medium uppercase tracking-[0.3em]">
      &copy; 2024 Grupo Tubocone &bull; Tubonord &bull; Sistema Interno
    </footer>
  </main>

  <script>
    // --- DADOS ---
    const faturamentos = {
      tubotecnico: {
        unidade: "tubocone",
        nome: "TUBOTÉCNICO INDUSTRIA E COMERCIO DE EMBALAGENS LTDA ME",
        cnpj: "03.466.523/0001-16",
        endereco: "Av. Pres. Castelo Branco, 2010 – BR 116 KM 37",
        cidade: "Catole – CEP 62887-285 – Horizonte/CE",
        fone: "(85) 3336-1414",
        rodKey: "CE"
      },
      tubocone: {
        unidade: "tubocone",
        nome: "TUBOCONE INDUSTRIA E COMERCIO DE EMBALAGENS EIRELI - EPP",
        cnpj: "06.557.482/0001-61",
        endereco: "Av. Pres. Castelo Branco, 2010 – BR 116 KM 37",
        cidade: "Catole – CEP 62887-285 – Horizonte/CE",
        fone: "(85) 3336-1414",
        rodKey: "CE"
      },
      palmeiras_filial: {
        unidade: "tubocone",
        nome: "PALMEIRAS FABRICAÇÃO DE EMBALAGENS LTDA",
        subnome: "Filial",
        cnpj: "41.373.639/0002-80",
        endereco: "Av. Pres. Castelo Branco, 2010 – BR 116 KM 37",
        cidade: "Catole – CEP 62887-285 – Horizonte/CE",
        fone: "(85) 3336-1414",
        rodKey: "CE"
      },
      tubonord: {
        unidade: "tubonord",
        nome: "TUBONORD INDUSTRIA E COMERCIO DE EMBALAGENS LTDA",
        cnpj: "38.318.624/0001-24",
        endereco: "Av. Dr. Lucas Soares Cardoso, 1335 – Distrito Industrial",
        cidade: "Bezerros/PE – CEP: 55660-000",
        fone: "(85) 99401-3853",
        rodKey: "PE"
      },
      palmeiras_matriz: {
        unidade: "tubonord",
        nome: "PALMEIRAS FABRICAÇÃO DE EMBALAGENS LTDA",
        subnome: "Matriz",
        cnpj: "41.373.639/0001-08",
        endereco: "Av. Dr. Lucas Soares Cardoso, 1335 – Distrito Industrial",
        cidade: "Bezerros/PE – CEP: 55660-000",
        fone: "(85) 99401-3853",
        rodKey: "PE"
      }
    };

    let listaItems = [];
    let editIndex = null;

    // --- INTERFACE ---
    function atualizarInterface() {
      const valor = document.getElementById('razao_faturamento').value;
      const logoCe = document.getElementById('logo-ce');
      const logoPe = document.getElementById('logo-pe');
      const texto = document.getElementById('unidade-texto');

      if (!valor) {
        logoCe.style.opacity = "0.2";
        logoPe.style.opacity = "0.2";
        texto.innerText = "SELECIONE A UNIDADE";
        return;
      }

      const info = faturamentos[valor];
      texto.innerText = "UNIDADE: " + info.unidade.toUpperCase();

      if (info.unidade === 'tubocone') {
        logoCe.style.opacity = "1";
        logoCe.style.filter = "none";
        logoPe.style.opacity = "0.2";
      } else {
        logoPe.style.opacity = "1";
        logoPe.style.filter = "none";
        logoCe.style.opacity = "0.2";
      }
    }

    function abrirFormProduto() {
      document.getElementById('form-produto').classList.remove('hidden');
      document.getElementById('btn-abrir-form').classList.add('hidden');
    }

    function cancelarProduto() {
      editIndex = null;
      document.getElementById('form-produto').classList.add('hidden');
      document.getElementById('btn-abrir-form').classList.remove('hidden');
      limparCamposProduto();
    }

    function limparCamposProduto() {
      ['t-med', 't-qtd', 't-ipi', 't-icms', 't-cif', 't-fob'].forEach(id => {
        document.getElementById(id).value = id === 't-ipi' || id === 't-icms' ? '0' : '';
      });
      document.getElementById('t-desc').selectedIndex = 0;
      document.getElementById('t-un').selectedIndex = 0;
    }

    function salvarProduto() {
      const item = {
        desc: document.getElementById('t-desc').value,
        med: document.getElementById('t-med').value.toUpperCase(),
        qtd: document.getElementById('t-qtd').value,
        un: document.getElementById('t-un').value,
        ipi: document.getElementById('t-ipi').value,
        icms: document.getElementById('t-icms').value,
        cif: document.getElementById('t-cif').value,
        fob: document.getElementById('t-fob').value
      };

      if (!item.med || !item.qtd) {
        alert("Preencha as medidas e a quantidade.");
        return;
      }

      if (editIndex !== null) {
        listaItems[editIndex] = item;
      } else {
        listaItems.push(item);
      }

      renderizarLista();
      cancelarProduto();
    }

    function renderizarLista() {
      const container = document.getElementById('lista-produtos');
      container.innerHTML = "";

      listaItems.forEach((it, idx) => {
        const div = document.createElement('div');
        div.className = "flex items-center justify-between p-4 bg-white border border-slate-200 rounded-2xl shadow-sm hover:border-blue-200 transition-all";
        div.innerHTML = `
          <div class="flex items-center gap-4">
            <div class="w-8 h-8 rounded-lg bg-blue-50 text-blue-700 flex items-center justify-center font-bold text-xs">${idx + 1}</div>
            <div>
              <p class="font-bold text-slate-800 text-sm">${it.desc}</p>
              <p class="text-[10px] text-slate-400 uppercase font-medium">Med: ${it.med} | Qtd: ${it.qtd} ${it.un}</p>
            </div>
          </div>
          <div class="flex gap-2">
            <button onclick="editarItem(${idx})" class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button onclick="removerItem(${idx})" class="p-2 text-slate-400 hover:text-red-600 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function editarItem(idx) {
      const it = listaItems[idx];
      editIndex = idx;
      document.getElementById('t-desc').value = it.desc;
      document.getElementById('t-med').value = it.med;
      document.getElementById('t-qtd').value = it.qtd;
      document.getElementById('t-un').value = it.un;
      document.getElementById('t-ipi').value = it.ipi;
      document.getElementById('t-icms').value = it.icms;
      document.getElementById('t-cif').value = it.cif;
      document.getElementById('t-fob').value = it.fob;
      abrirFormProduto();
    }

    function removerItem(idx) {
      listaItems.splice(idx, 1);
      renderizarLista();
    }

    // --- GERAÇÃO DE PDF ---
    async function validarEGerar() {
      const razao = document.getElementById('razao_faturamento').value;
      const cliente = document.getElementById('cliente').value;
      
      if (!razao) { alert("Selecione a Unidade de Faturamento."); return; }
      if (!cliente) { alert("Preencha o nome do Cliente."); return; }
      if (listaItems.length === 0) { alert("Adicione pelo menos um produto."); return; }

      gerarPDF();
    }

    function gerarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF("p", "mm", "a4");
      const primaryColor = [30, 58, 110];
      
      const razaoKey = document.getElementById('razao_faturamento').value;
      const fatur = faturamentos[razaoKey];

      // Cabeçalho
      doc.setFillColor(primaryColor[0], primaryColor[1], primaryColor[2]);
      doc.rect(0, 0, 210, 35, "F");
      
      doc.setTextColor(255);
      doc.setFontSize(10);
      doc.setFont("helvetica", "bold");
      const tituloUnidade = fatur.unidade === "tubocone" ? "TUBOCONE INDÚSTRIA E COMÉRCIO DE EMBALAGENS EIRELI – EPP" : "TUBONORD INDUSTRIA E COMERCIO DE EMBALAGENS LTDA";
      doc.text(tituloUnidade, 15, 15);
      
      doc.setFontSize(8);
      doc.setFont("helvetica", "normal");
      doc.text(`${fatur.endereco}\n${fatur.cidade}\n${fatur.fone}`, 15, 20);

      // Corpo
      doc.setTextColor(primaryColor[0], primaryColor[1], primaryColor[2]);
      doc.setFontSize(14);
      doc.setFont("helvetica", "bold");
      doc.text("COTAÇÃO DE PRODUTOS", 15, 48);

      const dataAtual = new Date().toLocaleDateString("pt-BR");
      doc.setFontSize(9);
      doc.setTextColor(100);
      doc.text(`Emissão: ${dataAtual}`, 195, 48, { align: "right" });

      // Boxes Cliente/Fornecedor
      doc.setFillColor(245, 248, 254);
      doc.rect(15, 55, 85, 25, "F");
      doc.setTextColor(150);
      doc.setFontSize(6);
      doc.text("FORNECEDOR (FATURAMENTO)", 18, 59);
      doc.setTextColor(0);
      doc.setFontSize(8);
      doc.setFont("helvetica", "bold");
      const nomeExibir = fatur.subnome ? `${fatur.nome} (${fatur.subnome})` : fatur.nome;
      doc.text(nomeExibir, 18, 64, { maxWidth: 80 });
      doc.setFont("helvetica", "normal");
      doc.text("CNPJ: " + fatur.cnpj, 18, 75);

      doc.setFillColor(250, 250, 250);
      doc.rect(110, 55, 85, 25, "F");
      doc.setTextColor(150);
      doc.text("CLIENTE", 113, 59);
      doc.setTextColor(0);
      doc.setFontSize(8);
      doc.setFont("helvetica", "bold");
      doc.text(document.getElementById('cliente').value.toUpperCase(), 113, 64, { maxWidth: 80 });
      doc.setFont("helvetica", "normal");
      doc.setTextColor(80);
      doc.text("SOLICITADO POR: " + document.getElementById('att').value.toUpperCase(), 113, 75);

      // Tabela
      const temCIF = listaItems.some(i => parseFloat(i.cif.replace(',','.')) > 0);
      const temFOB = listaItems.some(i => parseFloat(i.fob.replace(',','.')) > 0);

      let head = [["PRODUTO", "MEDIDAS", "QTD", "UND", "IPI", "ICMS"]];
      if (temCIF) head[0].push("VALOR CIF");
      if (temFOB) head[0].push("VALOR FOB");

      const body = listaItems.map(it => {
        let row = [it.desc, it.med.toUpperCase(), it.qtd, it.un, it.ipi + "%", it.icms + "%"];
        if (temCIF) row.push(it.cif ? "R$ " + it.cif : "---");
        if (temFOB) row.push(it.fob ? "R$ " + it.fob : "---");
        return row;
      });

      doc.autoTable({
        startY: 90,
        head: head,
        body: body,
        theme: 'grid',
        headStyles: { fillColor: primaryColor, fontSize: 8 },
        styles: { fontSize: 7, halign: 'center' }
      });

      // Condições
      let currentY = doc.lastAutoTable.finalY + 15;
      const condTitles = ["PRAZO ENTREGA", "COND. PAGAMENTO", "VALIDADE"];
      const condVals = [
        document.getElementById('prazo').value + " DIAS",
        document.getElementById('pagamento').value + " DIAS",
        document.getElementById('validade').value + " DIAS"
      ];

      for (let i = 0; i < 3; i++) {
        let x = 15 + (i * 62);
        doc.setFillColor(232, 237, 247);
        doc.rect(x, currentY, 58, 15, "F");
        doc.setTextColor(100); doc.setFontSize(6);
        doc.text(condTitles[i], x + 5, currentY + 5);
        doc.setTextColor(primaryColor[0], primaryColor[1], primaryColor[2]);
        doc.setFontSize(8); doc.setFont("helvetica", "bold");
        doc.text(condVals[i], x + 5, currentY + 11);
      }

      // Observações
      currentY += 25;
      doc.setFillColor(245, 245, 245);
      doc.rect(15, currentY, 180, 20, "F");
      doc.setTextColor(100); doc.setFontSize(7);
      doc.text("OBSERVAÇÕES:", 18, currentY + 6);
      doc.setTextColor(0); doc.setFontSize(8); doc.setFont("helvetica", "normal");
      const splitObs = doc.splitTextToSize(document.getElementById('obs').value.toUpperCase(), 170);
      doc.text(splitObs, 18, currentY + 12);

      // Assinatura
      currentY += 40;
      doc.line(130, currentY, 190, currentY);
      doc.setFontSize(8); doc.setFont("helvetica", "bold");
      doc.text(document.getElementById('resp_comercial').value.toUpperCase(), 160, currentY - 2, { align: "center" });
      doc.setFontSize(7); doc.setFont("helvetica", "normal");
      doc.text("Responsável Comercial", 160, currentY + 5, { align: "center" });

      // Rodapé
      doc.setFillColor(primaryColor[0], primaryColor[1], primaryColor[2]);
      doc.rect(0, 282, 210, 15, "F");
      doc.setTextColor(255); doc.setFontSize(7);
      doc.text(`${fatur.nome} | Unidade ${fatur.unidade.toUpperCase()}`, 105, 291, { align: "center" });

      doc.save(`COTACAO_${document.getElementById('cliente').value.toUpperCase()}.pdf`);
    }

    // Uppercase nos inputs
    document.addEventListener('input', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        if (e.target.type === 'text' || e.target.tagName === 'TEXTAREA') {
          e.target.value = e.target.value.toUpperCase();
        }
      }
    });

  </script>
</body>
</html>
